name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please **redact your PAT / auth token** from every field below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: I asked "..." and the tool returned ...
    validations:
      required: true
  - type: input
    id: mcp-client
    attributes:
      label: MCP client and version
      placeholder: Claude Desktop 0.x / Claude Code / Cursor / Cline ...
    validations:
      required: true
  - type: dropdown
    id: tableau-kind
    attributes:
      label: Tableau deployment
      options:
        - Tableau Server (on-prem)
        - Tableau Cloud
    validations:
      required: true
  - type: input
    id: tableau-version
    attributes:
      label: Tableau version
      placeholder: e.g. 2025.1.8
  - type: dropdown
    id: auth-mode
    attributes:
      label: Auth mode
      options:
        - Personal Access Token (PAT)
        - TABLEAU_AUTH_TOKEN
        - TABLEAU_COOKIE
    validations:
      required: true
  - type: textarea
    id: tool-call
    attributes:
      label: Exact tool call and error
      description: The tool name, arguments, and the full error text.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: redacted
    attributes:
      label: Confirmation
      options:
        - label: I redacted my PAT / auth token and any private content from this report
          required: true
